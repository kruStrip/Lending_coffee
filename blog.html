<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Блог - Арома Кафе</title>
    <meta name="description" content="Кофейный блог Арома Кафе — рецепты, секреты обжарки, кофейная культура и полезные статьи для настоящих ценителей кофе.">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <!-- Индикатор прогресса чтения -->
    <div class="reading-progress-bar" id="reading-progress"></div>

    <header>
        <div class="container">
            <nav>
                <a href="index.html" class="logo">Арома Кафе</a>
                <ul class="nav-links">
                    <li><a href="index.html">Главная</a></li>
                    <li><a href="blog.html">Блог</a></li>
                    <li><a href="about.html">О нас</a></li>
                    <li><a href="contacts.html">Контакты</a></li>
                    <li>
                        <a href="#" class="cart-link" data-action="open-cart">
                            <i class="fa-solid fa-bag-shopping"></i> Корзина <span class="cart-badge" id="cart-count" style="display:none;">0</span>
                        </a>
                    </li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <!-- === СПИСОК СТАТЕЙ === -->
        <section class="container blog-section" id="posts-section">
            <h1>Кофейный блог</h1>

            <!-- Фильтры -->
            <div class="filter-bar" id="blog-filters">
                <button class="filter-btn active" data-category="Все">Все</button>
                <button class="filter-btn" data-category="Рецепты"><i class="fa-solid fa-book-open"></i> Рецепты</button>
                <button class="filter-btn" data-category="Обжарка"><i class="fa-solid fa-fire"></i> Обжарка</button>
                <button class="filter-btn" data-category="Культура"><i class="fa-solid fa-earth-americas"></i> Культура</button>
            </div>

            <div id="posts-grid" class="posts-grid"></div>
        </section>

        <!-- === ПРОСМОТР СТАТЬИ === -->
        <section class="container article-section" id="article-view" style="display:none;">
            <button class="btn btn-back" id="back-to-posts">← Назад к статьям</button>
            <article class="article-content" id="article-content">
                <img src="" alt="" class="article-hero-img" id="article-img">
                <div class="article-meta" id="article-meta"></div>
                <h1 id="article-title">Загрузка...</h1>
                <div id="article-body" class="article-body"></div>
            </article>

            <!-- Комментарии -->
            <div class="comments-section">
                <h2>Комментарии</h2>
                <div id="comments-list" class="comments-list"></div>

                <div class="comment-form-wrapper">
                    <h3>Оставить комментарий</h3>
                    <form id="comment-form" class="comment-form" novalidate>
                        <div class="form-group">
                            <label for="comment-name">Имя</label>
                            <input type="text" id="comment-name" placeholder="Ваше имя" required minlength="2">
                            <span class="form-error" id="name-error"></span>
                        </div>
                        <div class="form-group">
                            <label for="comment-text">Комментарий</label>
                            <textarea id="comment-text" rows="4" placeholder="Напишите ваш комментарий..." required></textarea>
                            <span class="form-error" id="text-error"></span>
                        </div>
                        <input type="hidden" id="reply-to" value="">
                        <p class="reply-indicator" id="reply-indicator" style="display:none;">
                            Ответ на: <span id="reply-to-name"></span>
                            <button type="button" class="reply-cancel" id="cancel-reply">✕ Отмена</button>
                        </p>
                        <button type="submit" class="btn">Отправить</button>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Арома Кафе. Все права защищены.</p>
        </div>
    </footer>

    <!-- Кнопка «Наверх» -->
    <button class="scroll-top-btn" id="scroll-top" title="Наверх" style="display:none;">↑</button>

    <script src="js/blog.js"></script>
</body>

</html>
